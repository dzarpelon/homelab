# apps/hello-web/deploy.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: gitops-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-web
  namespace: gitops-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-web
  template:
    metadata:
      labels:
        app: hello-web
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/service-name: "hello-web"
    spec:
      containers:
        - name: web
          image: nginxdemos/hello:plain-text
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-web
  namespace: gitops-lab
spec:
  selector:
    app: hello-web
  ports:
    - name: http
      port: 80
      targetPort: 80
